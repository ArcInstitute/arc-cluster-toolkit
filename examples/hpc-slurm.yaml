---

blueprint_name: hpc-slurm

vars:
  project_id:  ## Set GCP Project ID Here ##
  deployment_name: hpc-slurm
  region: us-east1
  zone: us-east1-b
  enable_cleanup_compute: true
  ultima_bucket_name: ultima-auto-demux

# Documentation for each of the modules used below can be found at
# https://github.com/GoogleCloudPlatform/hpc-toolkit/blob/main/modules/README.md

deployment_groups:
- group: primary
  modules:
  # Source is an embedded module, denoted by "modules/*" without ./, ../, /
  # as a prefix. To refer to a local module, prefix with ./, ../ or /
  - id: network
    source: modules/network/vpc

  - id: homefs
    source: modules/file-system/filestore
    use: [network]
    settings:
      local_mount: /home

  - id: ultima-bucket
    source: modules/file-system/pre-existing-network-storage
    settings:
      remote_mount: $(vars.ultima_bucket_name)
      fs_type: gcsfuse
      local_mount: /mnt/$(vars.ultima_bucket_name)
      # Bucket will be read only.
      mount_options: defaults,_netdev,implicit_dirs,allow_other,ro

  - id: illumina-bucket
    source: modules/file-system/pre-existing-network-storage
    settings:
      remote_mount: illumina-auto-demux
      fs_type: gcsfuse
      local_mount: /mnt/illumina-auto-demux
      # Bucket will be read only.
      mount_options: defaults,_netdev,implicit_dirs,allow_other,ro
  
  - id: cellranger-bucket
    source: modules/file-system/pre-existing-network-storage
    settings:
      remote_mount: arc-ctc-cellranger
      fs_type: gcsfuse
      local_mount: /mnt/arc-ctc-cellranger
      mount_options: defaults,_netdev,implicit_dirs,allow_other,dir_mode=0777,file_mode=766
  
  - id: arc-binseq-bucket
    source: modules/file-system/pre-existing-network-storage
    settings:
      remote_mount: arc-binseq
      fs_type: gcsfuse
      local_mount: /mnt/arc-binseq
      mount_options: defaults,_netdev,implicit_dirs,allow_other,dir_mode=0777,file_mode=766

  - id: arc-cyto-bucket
    source: modules/file-system/pre-existing-network-storage
    settings:
      remote_mount: arc-cyto
      fs_type: gcsfuse
      local_mount: /mnt/arc-cyto
      mount_options: defaults,_netdev,implicit_dirs,allow_other,dir_mode=0777,file_mode=766


  - id: ssh_script
    source: modules/scripts/startup-script
    settings:
      configure_ssh_host_patterns: ['hpcslurm-*']


  - id: debug_nodeset
    source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
    use: [network,ssh_script]
    settings:
      node_count_dynamic_max: 4
      machine_type: n2-standard-4
      enable_placement: false # the default is: true
      allow_automatic_updates: false

  - id: debug_partition
    source: community/modules/compute/schedmd-slurm-gcp-v6-partition
    use:
    - debug_nodeset
    settings:
      partition_name: debug
      exclusive: false # allows nodes to stay up after jobs are done
      is_default: true

  - id: md_compute_nodeset
    source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
    use: [network,ssh_script]
    settings:
      node_count_dynamic_max: 40
      machine_type: c2d-standard-56
      disk_type: pd-ssd
      disk_size_gb: 10240
      bandwidth_tier: gvnic_enabled
      allow_automatic_updates: false

  - id: md_compute_partition
    source: community/modules/compute/schedmd-slurm-gcp-v6-partition
    use:
    - md_compute_nodeset
    settings:
      partition_name: computemedium

  - id: bg_compute_nodeset
    source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
    use: [network,ssh_script]
    settings:
      node_count_dynamic_max: 40
      machine_type: c2d-standard-112
      disk_type: pd-ssd
      disk_size_gb: 10240
      bandwidth_tier: gvnic_enabled
      allow_automatic_updates: false

  - id: bg_compute_partition
    source: community/modules/compute/schedmd-slurm-gcp-v6-partition
    use:
    - bg_compute_nodeset
    settings:
      partition_name: computelarge

  - id: slurm_login
    source: community/modules/scheduler/schedmd-slurm-gcp-v6-login
    use: [network]
    settings:
      machine_type: n2-standard-4
      enable_login_public_ips: true

  - id: slurm_controller
    source: community/modules/scheduler/schedmd-slurm-gcp-v6-controller
    use:
    - network
    - debug_partition
    - md_compute_partition
    - bg_compute_partition
    - homefs
    - ultima-bucket
    - illumina-bucket
    - arc-binseq-bucket
    - arc-cyto-bucket
    - cellranger-bucket
    - slurm_login
    settings:
      enable_controller_public_ips: true
